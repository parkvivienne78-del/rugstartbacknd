    <!-- Initial progress simulation and React loading transition -->
    <script>
      let initialProgress = 0;
      const initialProgressFill = document.getElementById('initial-progress-fill');

      // Simulate initial progress for basic page loading
      function updateInitialProgress() {
        if (initialProgress < 30) {
          initialProgress += Math.random() * 5;
          if (initialProgressFill) {
            initialProgressFill.style.width = Math.min(initialProgress, 30) + '%';
          }
          setTimeout(updateInitialProgress, 100);
        }
      }

      // Start initial progress simulation
      updateInitialProgress();

      // Global function for React to update progress
      window.updateLoadingProgress = function (progress) {
        // Re-query the element each time in case DOM changed
        const currentProgressFill = document.getElementById('initial-progress-fill');
        if (currentProgressFill) {
          currentProgressFill.style.width = progress + '%';
        }
      };

      // Function to hide initial loading when assets are loaded
      window.hideInitialLoading = function () {
        const initialLoading = document.getElementById('initial-loading');
        if (initialLoading) {
          // Fade out initial loading
          initialLoading.style.transition = 'opacity 0.3s ease-out';
          initialLoading.style.opacity = '0';
          setTimeout(() => initialLoading.remove(), 300);
        }
      };

      // Fallback: don't stay on loading forever if bundle/chunks fail.
      setTimeout(function () {
        const initialLoading = document.getElementById('initial-loading');
        if (initialLoading) {
          window.hideInitialLoading();
          const errorBanner = document.getElementById('local-error');
          if (errorBanner) errorBanner.style.display = 'block';
        }
      }, 10000);
    </script>
